<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Journal Trading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --surface3: #1f1f2e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8e6f0;
  --muted: #5e5b72;
  --muted2: #8a87a0;
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --green-border: rgba(34,197,94,0.22);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --red-border: rgba(239,68,68,0.22);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --accent: #6d5dfc;
  --accent2: #8b7dfd;
  --accent-dim: rgba(109,93,252,0.14);
  --accent-border: rgba(109,93,252,0.28);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;display:flex;flex-direction:column}

/* HEADER */
.hdr{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-logo{width:34px;height:34px;border-radius:10px;background:var(--accent-dim);border:1px solid var(--accent-border);display:flex;align-items:center;justify-content:center}
.hdr-logo svg{width:16px;height:16px}
.hdr-title{font-size:15px;font-weight:600;letter-spacing:-.3px}
.hdr-sub{font-size:10px;color:var(--muted2);margin-top:1px;font-family:'DM Mono',monospace}
.hdr-right{display:flex;align-items:center;gap:8px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-count{font-size:11px;color:var(--muted2);font-family:'DM Mono',monospace}

/* STATS BAR */
.stats-bar{flex-shrink:0;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat-cell{background:var(--surface);padding:11px 8px;text-align:center}
.stat-v{font-size:17px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-.5px}
.stat-v.g{color:var(--green)}
.stat-v.r{color:var(--red)}
.stat-v.a{color:var(--amber)}
.stat-v.p{color:var(--accent2)}
.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}

/* NAV TABS */
.tabs{flex-shrink:0;display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;gap:2px}
.tab{padding:11px 13px;font-size:12px;font-weight:500;color:var(--muted2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'Sora',sans-serif;letter-spacing:-.1px}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}

/* PAGES */
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px;display:none}
.page.active{display:block}

/* FORM CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px}
.card-title{font-size:10px;font-weight:600;color:var(--accent2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;color:var(--muted2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:13px;font-family:'Sora',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--surface2)}
textarea{resize:none;height:75px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.rr-box{background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.rr-label{font-size:11px;color:var(--muted2)}
.rr-val{font-size:21px;font-weight:600;font-family:'DM Mono',monospace;color:var(--accent2)}

/* CHECKLIST */
.checklist{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.chk{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 11px;cursor:pointer;transition:all .2s;font-size:11px;color:var(--muted2);font-weight:500;user-select:none}
.chk.on{background:var(--green-dim);border-color:var(--green-border);color:var(--green)}
.chk-dot{width:15px;height:15px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px}
.chk.on .chk-dot::after{content:'✓'}

/* BUTTONS */
.btn-save{width:100%;background:var(--accent);color:white;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:opacity .2s;letter-spacing:-.2px}
.btn-save:active{opacity:.8}
.btn-del{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border);border-radius:7px;padding:5px 10px;font-size:10px;cursor:pointer;font-family:'Sora',sans-serif;font-weight:600}

/* FILTER ROW */
.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{padding:6px 13px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--muted2);cursor:pointer;white-space:nowrap;font-family:'Sora',sans-serif;transition:all .2s}
.fbtn.active{background:var(--accent-dim);border-color:var(--accent-border);color:var(--accent2)}

/* TRADE CARDS */
.trade-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:9px;position:relative;overflow:hidden}
.trade-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.trade-card.win::before{background:var(--green)}
.trade-card.loss::before{background:var(--red)}
.trade-card.be::before{background:var(--amber)}
.trade-card.open::before{background:var(--blue)}
.tc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.tc-pair{font-size:15px;font-weight:600;font-family:'DM Mono',monospace}
.tc-date{font-size:10px;color:var(--muted2);font-family:'DM Mono',monospace}
.tc-badges{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.bdg{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em}
.bdg.long{background:var(--blue-dim);color:#60a5fa}
.bdg.short{background:var(--red-dim);color:#f87171}
.bdg.win{background:var(--green-dim);color:var(--green)}
.bdg.loss{background:var(--red-dim);color:var(--red)}
.bdg.be{background:var(--amber-dim);color:var(--amber)}
.bdg.open{background:var(--blue-dim);color:#60a5fa}
.bdg.sess{background:var(--surface2);color:var(--muted2)}
.tc-levels{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.lvl{background:var(--surface2);border-radius:8px;padding:6px 9px}
.lvl-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.lvl-v{font-size:11px;font-weight:500;font-family:'DM Mono',monospace;margin-top:2px}
.tc-bot{display:flex;align-items:center;justify-content:space-between;font-size:11px}
.tc-note{font-size:11px;color:var(--muted2);margin-top:7px;font-style:italic;border-top:1px solid var(--border);padding-top:7px;line-height:1.5}

/* STATS PAGE */
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.insight{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px}
.ins-title{font-size:11px;color:var(--muted2);margin-bottom:4px}
.ins-val{font-size:22px;font-weight:600;font-family:'DM Mono',monospace}
.ins-val.g{color:var(--green)}
.ins-val.r{color:var(--red)}
.ins-val.a{color:var(--amber)}
.ins-val.p{color:var(--accent2)}
.ins-sub{font-size:10px;color:var(--muted);margin-top:2px}
.bar-wrap{display:flex;align-items:flex-end;gap:4px;height:70px;margin-top:10px}
.bar{flex:1;border-radius:4px 4px 0 0;min-width:18px}
.bar.g{background:var(--green);opacity:.65}
.bar.r{background:var(--red);opacity:.65}
.perf-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.perf-row:last-child{border-bottom:none}

/* AI CHAT TAB */
.ai-shell{display:flex;flex-direction:column;height:100%}
.ai-header{flex-shrink:0;display:flex;align-items:center;gap:9px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);border-radius:12px 12px 0 0;margin-bottom:0}
.ai-av{width:28px;height:28px;border-radius:50%;background:var(--accent-dim);border:1px solid var(--accent-border);display:flex;align-items:center;justify-content:center}
.ai-av svg{width:13px;height:13px}
.ai-name{font-size:13px;font-weight:500}
.ai-mode{font-size:10px;color:var(--muted2);margin-top:1px}
.ai-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:260px}
.ai-msgs::-webkit-scrollbar{width:3px}
.ai-msgs::-webkit-scrollbar-track{background:transparent}
.ai-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.msg-row{display:flex;gap:7px;align-items:flex-end}
.msg-row.user{flex-direction:row-reverse}
.av{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
.av.ai{background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent2)}
.av.user{background:var(--accent);color:white}
.bub{padding:9px 12px;font-size:12.5px;line-height:1.65;max-width:86%;border-radius:12px}
.bub.ai{background:var(--surface2);color:var(--text);border-radius:12px 12px 12px 3px;border:1px solid var(--border)}
.bub.user{background:var(--accent);color:white;border-radius:12px 12px 3px 12px}
.dots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--muted2);margin:0 1.5px;animation:dot 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.ai-input-row{flex-shrink:0;display:flex;gap:8px;align-items:flex-end;padding:10px 12px;border-top:1px solid var(--border);background:var(--surface)}
#ai-inp{flex:1;border:none;background:transparent;font-size:13px;color:var(--text);resize:none;outline:none;min-height:20px;max-height:70px;font-family:'Sora',sans-serif;line-height:1.5}
#ai-inp::placeholder{color:var(--muted)}
.send-btn{width:28px;height:28px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.send-btn:disabled{opacity:.3;cursor:default}
.send-btn svg{width:12px;height:12px;fill:white}
.ai-shortcuts{flex-shrink:0;display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 12px;border-top:1px solid var(--border);background:var(--surface)}
.sc{padding:8px 11px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;text-align:left;transition:background .12s}
.sc:hover{background:var(--surface3)}
.sc-t{font-size:11px;font-weight:500;color:var(--text);display:block;margin-bottom:2px}
.sc-d{font-size:10px;color:var(--muted2);display:block}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--muted2)}
.empty-ico{font-size:36px;margin-bottom:10px;opacity:.4}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--green);color:#0a160e;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all .25s;z-index:300;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">
      <svg viewBox="0 0 16 16" fill="none" stroke="#8b7dfd" stroke-width="1.8">
        <polyline points="1,11 5,6 9,9 13,3 15,5"/>
      </svg>
    </div>
    <div>
      <div class="hdr-title">Journal Trading</div>
      <div class="hdr-sub" id="hdate"></div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="live-dot"></div>
    <div class="hdr-count" id="hcount">0 trades</div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-cell"><div class="stat-v g" id="s-wr">—</div><div class="stat-l">Winrate</div></div>
  <div class="stat-cell"><div class="stat-v a" id="s-rr">—</div><div class="stat-l">R:R moy.</div></div>
  <div class="stat-cell"><div class="stat-v" id="s-total">0</div><div class="stat-l">Trades</div></div>
  <div class="stat-cell"><div class="stat-v p" id="s-disc">—</div><div class="stat-l">Discipline</div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('add',this)">+ Nouveau</button>
  <button class="tab" onclick="switchTab('history',this)">Historique</button>
  <button class="tab" onclick="switchTab('stats',this)">Stats</button>
  <button class="tab" onclick="switchTab('ai',this)">IA ✦</button>
</div>

<div class="pages">

<!-- PAGE ADD -->
<div class="page active" id="page-add">
  <div class="card">
    <div class="card-title">Informations du trade</div>
    <div class="row2">
      <div class="field"><label>Date</label><input type="date" id="f-date"></div>
      <div class="field"><label>Heure</label><input type="time" id="f-time"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Actif</label>
        <select id="f-asset">
          <option>EURUSD</option><option>GBPUSD</option><option>NAS100</option>
          <option>US30</option><option>XAUUSD</option><option>GBPJPY</option><option>Autre</option>
        </select>
      </div>
      <div class="field"><label>Direction</label>
        <select id="f-dir"><option>Long</option><option>Short</option></select>
      </div>
    </div>
    <div class="row3">
      <div class="field"><label>Entrée</label><input type="number" id="f-entry" placeholder="1.0850" step="0.00001" oninput="calcRR()"></div>
      <div class="field"><label>SL</label><input type="number" id="f-sl" placeholder="1.0820" step="0.00001" oninput="calcRR()"></div>
      <div class="field"><label>TP</label><input type="number" id="f-tp" placeholder="1.0910" step="0.00001" oninput="calcRR()"></div>
    </div>
    <div class="rr-box">
      <span class="rr-label">R:R calculé</span>
      <span class="rr-val" id="rr-val">—</span>
    </div>
    <div class="row2">
      <div class="field"><label>Session</label>
        <select id="f-session"><option>London</option><option>NY Open</option><option>Asia</option><option>Autre</option></select>
      </div>
      <div class="field"><label>Résultat</label>
        <select id="f-result">
          <option value="">En cours</option><option value="win">Gagné</option>
          <option value="loss">Perdu</option><option value="be">Break Even</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Checklist discipline</div>
    <div class="checklist" id="checklist">
      <div class="chk" onclick="this.classList.toggle('on')"><div class="chk-dot"></div>Biais Daily</div>
      <div class="chk" onclick="this.classList.toggle('on')"><div class="chk-dot"></div>Zone OB/FVG</div>
      <div class="chk" onclick="this.classList.toggle('on')"><div class="chk-dot"></div>Fibo 0.618+</div>
      <div class="chk" onclick="this.classList.toggle('on')"><div class="chk-dot"></div>Stoch RSI</div>
      <div class="chk" onclick="this.classList.toggle('on')"><div class="chk-dot"></div>R:R min 2:1</div>
      <div class="chk" onclick="this.classList.toggle('on')"><div class="chk-dot"></div>Pas de news</div>
      <div class="chk" onclick="this.classList.toggle('on')"><div class="chk-dot"></div>Volume confirm.</div>
    </div>
    <div class="field"><label>Notes / Leçon</label>
      <textarea id="f-note" placeholder="Ex: OB H4 + FVG H1 comblé, Stoch RSI en survente, bonne confluence…"></textarea>
    </div>
    <button class="btn-save" onclick="saveTrade()">Enregistrer le trade</button>
  </div>
</div>

<!-- PAGE HISTORY -->
<div class="page" id="page-history">
  <div class="filter-row">
    <button class="fbtn active" onclick="setFilter('all',this)">Tous</button>
    <button class="fbtn" onclick="setFilter('win',this)">Gagnés</button>
    <button class="fbtn" onclick="setFilter('loss',this)">Perdus</button>
    <button class="fbtn" onclick="setFilter('be',this)">Break Even</button>
    <button class="fbtn" onclick="setFilter('open',this)">En cours</button>
  </div>
  <div id="trades-list"></div>
</div>

<!-- PAGE STATS -->
<div class="page" id="page-stats">
  <div id="stats-content"></div>
</div>

<!-- PAGE AI -->
<div class="page" id="page-ai" style="padding:0;display:flex;flex-direction:column">
  <div class="ai-shell">
    <div class="ai-header">
      <div class="ai-av">
        <svg viewBox="0 0 13 13" fill="none" stroke="#8b7dfd" stroke-width="2"><circle cx="6.5" cy="4" r="2.2"/><path d="M1.5 11c0-2.5 2.2-4 5-4s5 1.5 5 4"/></svg>
      </div>
      <div>
        <div class="ai-name">Assistant trading IA</div>
        <div class="ai-mode">SMC · ICT · Analyse · Journal</div>
      </div>
    </div>
    <div class="ai-msgs" id="ai-msgs"></div>
    <div class="ai-shortcuts">
      <button class="sc" onclick="aiQuick('Je viens de prendre un trade LONG sur EUR/USD. Entrée 1.0850, SL 1.0820, TP 1.0910. OB identifié H4, FVG H1 comblé, RSI sto en survente.')">
        <span class="sc-t">+ Logger un trade</span><span class="sc-d">Entrée · SL · TP · confluences</span>
      </button>
      <button class="sc" onclick="aiQuick('Analyse mon dernier trade et identifie les erreurs et améliorations selon SMC/ICT.')">
        <span class="sc-t">Analyser mon trade</span><span class="sc-d">Review confluence + exécution</span>
      </button>
      <button class="sc" onclick="aiQuick('Fais un bilan complet de mes performances et identifie mes patterns récurrents.')">
        <span class="sc-t">Bilan performances</span><span class="sc-d">Stats · patterns · faiblesses</span>
      </button>
      <button class="sc" onclick="aiQuick('Quels sont les meilleurs setups ICT et SMC à surveiller cette semaine ?')">
        <span class="sc-t">Setups de la semaine</span><span class="sc-d">ICT · SMC · Liquidity</span>
      </button>
    </div>
    <div class="ai-input-row">
      <textarea id="ai-inp" rows="1" placeholder="Décris ton trade ou pose une question…"></textarea>
      <button class="send-btn" id="send-btn" onclick="aiSend()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

</div><!-- /pages -->

<div class="toast" id="toast"></div>

<script>
let trades = JSON.parse(localStorage.getItem('tj_v3') || '[]');
let currentFilter = 'all';
let aiHistory = [];
let aiLoading = false;

const AI_SYSTEM = `Tu es un assistant trading expert spécialisé dans l'analyse technique avancée. Tu aides le trader à tenir son journal de trading de façon interactive, structurée et analytique.

Setup du trader : Bandes de Bollinger (BB), Fibonacci (retracements/extensions), RSI Stochastique, Order Blocks (OB), Fair Value Gaps (FVG), Smart Money Concepts (SMC) et ICT (Inner Circle Trader).

Quand le trader décrit un trade :
1. Valide ou challenge la confluence des indicateurs (OB + FVG + BB + Fibo + RSI Sto)
2. Évalue la qualité du setup selon SMC/ICT (liquidity sweep, BOS, CHoCH, Premium/Discount zones)
3. Identifie les erreurs potentielles et améliorations
4. Donne un score de confluence /10
5. Pose une question si des infos manquent

Pour les bilans de perf, identifie les patterns (sessions, paires, directions, qualité exécution).
Réponds en français, concis mais expert. 4-5 phrases max sauf si demandé plus.`;

// INIT
const now = new Date();
document.getElementById('hdate').textContent = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
document.getElementById('f-date').value = now.toISOString().split('T')[0];
document.getElementById('f-time').value = now.toTimeString().slice(0,5);
updateGlobalStats();

// TAB SWITCH
function switchTab(tab, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  el.classList.add('active');
  if(tab==='history') renderHistory();
  if(tab==='stats') renderStats();
  if(tab==='ai' && aiHistory.length===0) aiInit();
}

// RR CALC
function calcRR() {
  const e=parseFloat(document.getElementById('f-entry').value);
  const s=parseFloat(document.getElementById('f-sl').value);
  const t=parseFloat(document.getElementById('f-tp').value);
  const el=document.getElementById('rr-val');
  if(!e||!s||!t){el.textContent='—';el.style.color='var(--accent2)';return;}
  const risk=Math.abs(e-s), reward=Math.abs(t-e);
  if(!risk)return;
  const rr=(reward/risk).toFixed(2);
  el.textContent=rr+':1';
  el.style.color=parseFloat(rr)>=2?'var(--green)':'var(--red)';
}

// SAVE TRADE
function saveTrade() {
  const entry=document.getElementById('f-entry').value;
  if(!entry){alert("Remplis le prix d'entrée");return;}
  const checks=document.querySelectorAll('#checklist .chk');
  let disc=0; checks.forEach(c=>{if(c.classList.contains('on'))disc++;});
  const e=parseFloat(entry), s=parseFloat(document.getElementById('f-sl').value)||null, t=parseFloat(document.getElementById('f-tp').value)||null;
  const risk=s?Math.abs(e-s):null, reward=t?Math.abs(t-e):null;
  const rr=(risk&&reward)?(reward/risk).toFixed(2):null;
  const trade={
    id:Date.now(),
    date:document.getElementById('f-date').value,
    time:document.getElementById('f-time').value,
    asset:document.getElementById('f-asset').value,
    dir:document.getElementById('f-dir').value,
    entry:e,sl:s,tp:t,rr,
    session:document.getElementById('f-session').value,
    result:document.getElementById('f-result').value||'open',
    disc,
    note:document.getElementById('f-note').value
  };
  trades.unshift(trade);
  localStorage.setItem('tj_v3',JSON.stringify(trades));
  updateGlobalStats();
  clearForm();
  showToast('Trade enregistré ✓');
}

function clearForm() {
  ['f-entry','f-sl','f-tp','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-result').value='';
  document.getElementById('rr-val').textContent='—';
  document.querySelectorAll('#checklist .chk').forEach(c=>c.classList.remove('on'));
  const n=new Date();
  document.getElementById('f-date').value=n.toISOString().split('T')[0];
  document.getElementById('f-time').value=n.toTimeString().slice(0,5);
}

function deleteTrade(id) {
  if(!confirm('Supprimer ce trade ?'))return;
  trades=trades.filter(t=>t.id!==id);
  localStorage.setItem('tj_v3',JSON.stringify(trades));
  updateGlobalStats(); renderHistory();
}

// FILTER
function setFilter(f,btn) {
  currentFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}

// RENDER HISTORY
function renderHistory() {
  const list=document.getElementById('trades-list');
  const filtered=currentFilter==='all'?trades:trades.filter(t=>t.result===currentFilter);
  if(!filtered.length){list.innerHTML=`<div class="empty"><div class="empty-ico">📋</div><div>Aucun trade ici</div></div>`;return;}
  list.innerHTML=filtered.map(t=>{
    const resBdg=t.result==='win'?'<span class="bdg win">Gagné</span>':t.result==='loss'?'<span class="bdg loss">Perdu</span>':t.result==='be'?'<span class="bdg be">BE</span>':'<span class="bdg open">En cours</span>';
    const dirBdg=`<span class="bdg ${t.dir.toLowerCase()}">${t.dir}</span>`;
    const rrCol=t.rr&&parseFloat(t.rr)>=2?'var(--green)':t.rr?'var(--red)':'var(--muted2)';
    const discCol=t.disc>=6?'var(--green)':t.disc>=4?'var(--amber)':'var(--red)';
    return `<div class="trade-card ${t.result||'open'}">
      <div class="tc-top">
        <span class="tc-pair">${t.asset}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="tc-date">${t.date} ${t.time||''}</span>
          <button class="btn-del" onclick="deleteTrade(${t.id})">✕</button>
        </div>
      </div>
      <div class="tc-badges">${dirBdg}${resBdg}<span class="bdg sess">${t.session||'—'}</span></div>
      <div class="tc-levels">
        <div class="lvl"><div class="lvl-l">Entrée</div><div class="lvl-v">${t.entry}</div></div>
        <div class="lvl"><div class="lvl-l">SL</div><div class="lvl-v" style="color:var(--red)">${t.sl||'—'}</div></div>
        <div class="lvl"><div class="lvl-l">TP</div><div class="lvl-v" style="color:var(--green)">${t.tp||'—'}</div></div>
      </div>
      <div class="tc-bot">
        <span style="font-size:12px;color:${rrCol};font-family:'DM Mono',monospace;font-weight:600">${t.rr?'R:R '+t.rr+':1':'—'}</span>
        <span style="font-size:11px;color:var(--muted2)">Disc. <span style="color:${discCol};font-weight:600">${t.disc}/7</span></span>
      </div>
      ${t.note?`<div class="tc-note">${t.note}</div>`:''}
    </div>`;
  }).join('');
}

// RENDER STATS
function renderStats() {
  const el=document.getElementById('stats-content');
  if(!trades.length){el.innerHTML=`<div class="empty"><div class="empty-ico">📊</div><div>Enregistre des trades pour voir tes stats</div></div>`;return;}
  const done=trades.filter(t=>t.result&&t.result!=='open');
  const wins=trades.filter(t=>t.result==='win');
  const losses=trades.filter(t=>t.result==='loss');
  const wr=done.length?Math.round(wins.length/done.length*100):0;
  const withRR=trades.filter(t=>t.rr);
  const avgRR=withRR.length?(withRR.reduce((a,t)=>a+parseFloat(t.rr),0)/withRR.length).toFixed(2):null;
  const avgDisc=trades.length?Math.round(trades.reduce((a,t)=>a+t.disc/7*100,0)/trades.length):0;
  const wrC=wr>=60?'g':wr>=40?'a':'r';
  const rrC=avgRR&&parseFloat(avgRR)>=2?'g':'r';
  const discC=avgDisc>=80?'g':avgDisc>=50?'a':'r';

  const byAsset={};
  trades.forEach(t=>{if(!byAsset[t.asset])byAsset[t.asset]={total:0,wins:0};byAsset[t.asset].total++;if(t.result==='win')byAsset[t.asset].wins++;});
  const bySession={};
  trades.forEach(t=>{const s=t.session||'Autre';if(!bySession[s])bySession[s]={total:0,wins:0};bySession[s].total++;if(t.result==='win')bySession[s].wins++;});
  const last8=trades.slice(0,8).reverse();

  el.innerHTML=`
    <div class="insight-grid">
      <div class="insight"><div class="ins-title">Winrate</div><div class="ins-val ${wrC}">${wr}%</div><div class="ins-sub">${wins.length}W / ${losses.length}L</div></div>
      <div class="insight"><div class="ins-title">R:R moyen</div><div class="ins-val ${rrC}">${avgRR||'—'}</div><div class="ins-sub">Cible min. 2:1</div></div>
      <div class="insight"><div class="ins-title">Discipline</div><div class="ins-val ${discC}">${avgDisc}%</div><div class="ins-sub">Score checklist moy.</div></div>
      <div class="insight"><div class="ins-title">Total trades</div><div class="ins-val">${trades.length}</div><div class="ins-sub">${done.length} clôturés</div></div>
    </div>

    ${last8.length>1?`<div class="card"><div class="card-title">Derniers ${last8.length} trades</div><div class="bar-wrap">${last8.map(t=>`<div class="bar ${t.result==='win'?'g':'r'}" style="height:${t.result==='win'?65:38}px"></div>`).join('')}</div></div>`:''}

    <div class="card">
      <div class="card-title">Perf. par actif</div>
      ${Object.entries(byAsset).map(([a,d])=>{const w=Math.round(d.wins/d.total*100);return`<div class="perf-row"><span style="font-family:'DM Mono',monospace;font-size:13px;font-weight:500">${a}</span><div style="display:flex;align-items:center;gap:10px"><span style="font-size:11px;color:var(--muted2)">${d.total} trades</span><span style="font-size:13px;font-weight:600;color:${w>=60?'var(--green)':w>=40?'var(--amber)':'var(--red)'}">${w}%</span></div></div>`;}).join('')}
    </div>

    <div class="card">
      <div class="card-title">Perf. par session</div>
      ${Object.entries(bySession).map(([s,d])=>{const w=Math.round(d.wins/d.total*100);return`<div class="perf-row"><span style="font-size:13px">${s}</span><div style="display:flex;align-items:center;gap:10px"><span style="font-size:11px;color:var(--muted2)">${d.total} trades</span><span style="font-size:13px;font-weight:600;color:${w>=60?'var(--green)':w>=40?'var(--amber)':'var(--red)'}">${w}%</span></div></div>`;}).join('')}
    </div>

    <div style="padding:4px 0 20px;text-align:center">
      <button onclick="exportData()" style="background:var(--surface2);color:var(--muted2);border:1px solid var(--border);border-radius:10px;padding:9px 18px;font-size:11px;cursor:pointer;font-family:'Sora',sans-serif">Exporter JSON</button>
    </div>`;
}

function exportData() {
  const blob=new Blob([JSON.stringify(trades,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='journal_trading.json';a.click();
}

// GLOBAL STATS
function updateGlobalStats() {
  const total=trades.length;
  const done=trades.filter(t=>t.result&&t.result!=='open');
  const wins=trades.filter(t=>t.result==='win');
  const wr=done.length?Math.round(wins.length/done.length*100):null;
  const withRR=trades.filter(t=>t.rr);
  const avgRR=withRR.length?(withRR.reduce((a,t)=>a+parseFloat(t.rr),0)/withRR.length).toFixed(1):null;
  const avgDisc=trades.length?Math.round(trades.reduce((a,t)=>a+t.disc/7*100,0)/trades.length):null;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-wr').textContent=wr!==null?wr+'%':'—';
  const wrEl=document.getElementById('s-wr');
  wrEl.className='stat-v '+(wr>=60?'g':wr>=40?'a':'r');
  document.getElementById('s-rr').textContent=avgRR?avgRR+':1':'—';
  const discEl=document.getElementById('s-disc');
  discEl.textContent=avgDisc!==null?avgDisc+'%':'—';
  discEl.className='stat-v '+(avgDisc>=80?'g':avgDisc>=50?'a':'p');
  document.getElementById('hcount').textContent=total+' trade'+(total>1?'s':'');
}

// TOAST
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// AI CHAT
function aiAddMsg(role,text) {
  const c=document.getElementById('ai-msgs');
  const d=document.createElement('div');
  d.className='msg-row '+role;
  const avHTML=role==='ai'?`<svg viewBox="0 0 13 13" width="12" height="12" fill="none" stroke="#8b7dfd" stroke-width="2"><circle cx="6.5" cy="4" r="2.2"/><path d="M1.5 11c0-2.5 2.2-4 5-4s5 1.5 5 4"/></svg>`:'Moi';
  d.innerHTML=`<div class="av ${role}">${avHTML}</div><div class="bub ${role}">${text.replace(/\n/g,'<br>')}</div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}

function aiAddTyping() {
  const c=document.getElementById('ai-msgs');
  const d=document.createElement('div');
  d.className='msg-row ai';d.id='typing';
  d.innerHTML=`<div class="av ai"><svg viewBox="0 0 13 13" width="12" height="12" fill="none" stroke="#8b7dfd" stroke-width="2"><circle cx="6.5" cy="4" r="2.2"/><path d="M1.5 11c0-2.5 2.2-4 5-4s5 1.5 5 4"/></svg></div><div class="bub ai"><div class="dots"><span></span><span></span><span></span></div></div>`;
  c.appendChild(d);c.scrollTop=c.scrollHeight;
}

function aiRemoveTyping(){const t=document.getElementById('typing');if(t)t.remove();}

async function aiFetch() {
  if(aiLoading)return;
  aiLoading=true;
  document.getElementById('send-btn').disabled=true;
  aiAddTyping();
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:AI_SYSTEM,messages:aiHistory})});
    const d=await r.json();
    const txt=d.content?.find(b=>b.type==='text')?.text||'Erreur de réponse.';
    aiRemoveTyping();
    aiHistory.push({role:'assistant',content:txt});
    aiAddMsg('ai',txt);
  }catch(e){aiRemoveTyping();aiAddMsg('ai','Erreur de connexion. Réessaie.');}
  aiLoading=false;
  document.getElementById('send-btn').disabled=false;
}

function aiSend() {
  const inp=document.getElementById('ai-inp');
  const txt=inp.value.trim();
  if(!txt||aiLoading)return;
  inp.value='';inp.style.height='auto';
  aiAddMsg('user',txt);
  aiHistory.push({role:'user',content:txt});
  aiFetch();
}

function aiQuick(txt) {
  if(aiLoading)return;
  aiAddMsg('user',txt);
  aiHistory.push({role:'user',content:txt});
  aiFetch();
}

function aiInit() {
  const msg="Tu es mon assistant trading. Je veux utiliser ce chat comme journal de trading interactif. Aide moi à noter et analyser mes trades. Setup : Bandes de Bollinger, Fibonacci, RSI Stochastique, Order Blocks, FVG, SMC et ICT.";
  aiAddMsg('user',msg);
  aiHistory.push({role:'user',content:msg});
  aiFetch();
}

const aiInp=document.getElementById('ai-inp');
aiInp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();aiSend();}});
aiInp.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,70)+'px';});
</script>
